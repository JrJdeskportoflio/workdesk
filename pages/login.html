<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
  <title>myWORKDESK | Secure Enterprise Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <style>
    :root {
      --primary:       #5A8F7B;
      --primary-dark:  #497263;
      --primary-rgb:   90, 143, 123;
      --primary-soft:  #EBF4F1;
      --accent:        #F4C86A;
      --danger:        #E74C3C;
      --rp-bg:         #0d1f16;
      --rp-mint:       #a8d8c8;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      background: var(--rp-bg);
      color: #fff;
      -webkit-font-smoothing: antialiased;
    }

    /* ======= LEFT: COVER IMAGE PANEL ======= */
    .cover-panel {
      flex: 0 0 58%;
      position: relative;
      overflow: hidden;
      background: #1a2e28;
    }

    .cover-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      animation: kenBurns 20s ease-in-out infinite alternate;
      will-change: transform;
    }

    @keyframes kenBurns {
      from { transform: scale(1.0) translate(0, 0); }
      to   { transform: scale(1.07) translate(-1.5%, 1%); }
    }

    /* ── Gradient bleed into right panel ─────── */
    .cover-panel::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to right, transparent 55%, rgba(13, 31, 22, 0.90) 100%),
        linear-gradient(to bottom, rgba(13, 31, 22, 0.18) 0%, transparent 25%, transparent 75%, rgba(13, 31, 22, 0.28) 100%);
      pointer-events: none;
      z-index: 1;
    }

    /* ── Floating ambient orbs (pure CSS) ─────── */
    .cover-anim-layer {
      position: absolute;
      inset: 0;
      z-index: 2;
      overflow: hidden;
      pointer-events: none;
    }

    .float-orb {
      position: absolute;
      border-radius: 50%;
      background: rgba(90, 143, 123, 0.13);
      border: 1px solid rgba(90, 143, 123, 0.20);
      animation: floatOrb linear infinite;
    }

    @keyframes floatOrb {
      0%   { transform: translateY(0) rotate(0deg);      opacity: 0; }
      8%   { opacity: 0.75; }
      88%  { opacity: 0.45; }
      100% { transform: translateY(-108vh) rotate(200deg); opacity: 0; }
    }

    .float-orb:nth-child(1) { width: 50px;  height: 50px;  left: 14%;  bottom: -60px;  animation-duration: 14s;  animation-delay: 0s; }
    .float-orb:nth-child(2) { width: 26px;  height: 26px;  left: 37%;  bottom: -32px;  animation-duration: 10s;  animation-delay: 2s; }
    .float-orb:nth-child(3) { width: 70px;  height: 70px;  left: 62%;  bottom: -80px;  animation-duration: 17s;  animation-delay: 5s; }
    .float-orb:nth-child(4) { width: 34px;  height: 34px;  left: 80%;  bottom: -44px;  animation-duration: 12s;  animation-delay: 1s; }
    .float-orb:nth-child(5) {
      width: 56px; height: 56px; left: 27%; bottom: -68px;
      animation-duration: 19s; animation-delay: 7s;
      background: rgba(244, 200, 106, 0.07); border-color: rgba(244, 200, 106, 0.13);
    }
    .float-orb:nth-child(6) { width: 20px;  height: 20px;  left: 51%;  bottom: -26px;  animation-duration: 9s;   animation-delay: 3.5s; }
    .float-orb:nth-child(7) { width: 40px;  height: 40px;  left: 5%;   bottom: -50px;  animation-duration: 15s;  animation-delay: 9s; }

    /* ======= RIGHT: CONTENT + FORM PANEL ======= */
    .right-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-y: auto;
      overflow-x: hidden;
      background: var(--rp-bg);
      padding: 44px 40px;
      border-left: 1px solid rgba(90, 143, 123, 0.22);
      position: relative;
      animation: rpEntrance 0.55s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    /* ── Left-edge accent glow ─────── */
    .right-panel::before {
      content: '';
      position: absolute;
      left: 0;
      top: 15%;
      bottom: 15%;
      width: 1px;
      background: linear-gradient(to bottom, transparent, rgba(90, 143, 123, 0.55) 40%, rgba(90, 143, 123, 0.55) 60%, transparent);
      pointer-events: none;
    }

    @keyframes rpEntrance {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* ── Inner wrapper (max-width) ─────── */
    .rp-inner {
      width: 100%;
      max-width: 390px;
    }

    /* ── Logo ─────── */
    .rp-logo {
      margin-bottom: 28px;
      animation: slideUp 0.45s cubic-bezier(0.16, 1, 0.3, 1) both 0.1s;
    }

    .rp-logo-img {
      height: 42px;
      width: auto;
      object-fit: contain;
      filter: brightness(1.15) drop-shadow(0 2px 8px rgba(0, 0, 0, 0.40));
    }

    /* ── Hero heading ─────── */
    .rp-heading {
      font-size: clamp(34px, 4vw, 54px);
      font-weight: 800;
      line-height: 0.92;
      text-transform: uppercase;
      color: #fff;
      text-shadow: 0 2px 18px rgba(0, 0, 0, 0.45);
      margin-bottom: 15px;
      animation: slideUp 0.45s cubic-bezier(0.16, 1, 0.3, 1) both 0.18s;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Animated subtitle ─────── */
    .animated-sub {
      font-size: clamp(13px, 1.4vw, 16px);
      color: rgba(255, 255, 255, 0.70);
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 20px;
      animation: slideUp 0.45s cubic-bezier(0.16, 1, 0.3, 1) both 0.26s;
    }

    .animated-sub .rotator-text {
      color: var(--rp-mint);
      font-weight: 700;
      border-left: 2px solid var(--rp-mint);
      padding-left: 10px;
    }

    .fade-cycle { animation: fadeCycle 4s infinite; }

    @keyframes fadeCycle {
      0%, 100% { opacity: 0; transform: translateY(5px); }
      10%, 90%  { opacity: 1; transform: translateY(0); }
    }

    /* ── Quote box ─────── */
    .hero-quote-box {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-left: 3px solid rgba(168, 216, 200, 0.65);
      border-radius: 10px;
      padding: 13px 16px;
      margin-bottom: 24px;
      animation: slideUp 0.45s cubic-bezier(0.16, 1, 0.3, 1) both 0.32s;
    }

    .hero-quote-text {
      font-size: 12.5px;
      font-style: italic;
      color: rgba(255, 255, 255, 0.78);
      line-height: 1.55;
      margin-bottom: 6px;
    }

    .hero-quote-author {
      font-size: 11px;
      font-weight: 700;
      color: var(--rp-mint);
    }

    @keyframes qFadeIn  { from { opacity: 0; transform: translateY(6px);  } to { opacity: 1; transform: translateY(0); } }
    @keyframes qFadeOut { from { opacity: 1; transform: translateY(0);  } to { opacity: 0; transform: translateY(-6px); } }

    .hero-quote-text.fade-in  { animation: qFadeIn  0.5s ease forwards; }
    .hero-quote-text.fade-out { animation: qFadeOut 0.4s ease forwards; }

    /* ── Section divider ─────── */
    .rp-divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(to right, rgba(90, 143, 123, 0.55), rgba(90, 143, 123, 0.12), transparent);
      margin-bottom: 22px;
      animation: slideUp 0.45s cubic-bezier(0.16, 1, 0.3, 1) both 0.37s;
    }

    /* ── Login form ─────── */
    .rp-form {
      display: flex;
      flex-direction: column;
      gap: 13px;
      animation: slideUp 0.45s cubic-bezier(0.16, 1, 0.3, 1) both 0.42s;
    }

    /* ── Two-column row (Org ID + Employee ID) ─────── */
    .rp-fields-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 11px;
    }

    /* ── Field group ─────── */
    .h-field {
      display: flex;
      flex-direction: column;
    }

    /* ── Input wrap ─────── */
    .h-input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .h-input-wrap .h-icon {
      position: absolute;
      left: 11px;
      color: rgba(255, 255, 255, 0.52);
      font-size: 12px;
      pointer-events: none;
      z-index: 1;
    }

    .h-input-wrap input {
      width: 100%;
      height: 40px;
      padding: 0 12px 0 32px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.07);
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      color: #fff;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }

    .h-input-wrap input::placeholder { color: rgba(255, 255, 255, 0.38); }

    .h-input-wrap input:focus {
      border-color: rgba(90, 143, 123, 0.80);
      background: rgba(90, 143, 123, 0.09);
      box-shadow: 0 0 0 3px rgba(90, 143, 123, 0.15);
    }

    .h-input-wrap input.is-invalid { border-color: var(--danger); }

    /* ── Password eye toggle ─────── */
    .h-input-wrap input.pwd-input { padding-right: 36px; }

    .h-eye-toggle {
      position: absolute;
      right: 10px;
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(255, 255, 255, 0.50);
      padding: 0;
      display: flex;
      align-items: center;
    }

    .h-eye-toggle svg { width: 15px; height: 15px; }

    /* ── Field error ─────── */
    .h-field-error {
      font-size: 11px;
      color: #ffb3ae;
      margin-top: 3px;
      display: none;
      padding-left: 2px;
    }

    /* ── Sign In button ─────── */
    .btn-header-signin {
      width: 100%;
      height: 42px;
      background: var(--primary);
      color: #fff;
      border: 1px solid var(--primary-dark);
      border-radius: 8px;
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.55px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
      margin-top: 2px;
    }

    .btn-header-signin:hover {
      transform: translateY(-1px);
      background: var(--primary-dark);
      box-shadow: 0 6px 18px rgba(var(--primary-rgb), 0.38);
    }

    .btn-header-signin:active  { transform: scale(0.98); }
    .btn-header-signin:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }

    .h-spinner {
      display: none;
      width: 13px;
      height: 13px;
      border: 2px solid rgba(255, 255, 255, 0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-header-signin.loading .h-spinner { display: block; }

    /* ── OR divider row ─────── */
    .rp-sso-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .rp-sso-divider {
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.10);
    }

    .h-sep {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      color: rgba(255, 255, 255, 0.38);
      white-space: nowrap;
    }

    /* ── SSO buttons ─────── */
    .h-sso-btns {
      display: flex;
      gap: 9px;
    }

    .h-sso-btn {
      flex: 1;
      height: 37px;
      padding: 0 10px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.06);
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.80);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background 0.2s, border-color 0.2s;
    }

    .h-sso-btn:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.35);
    }

    /* ── Aux links ─────── */
    .h-aux-links {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .h-aux-links a {
      color: rgba(255, 255, 255, 0.58);
      text-decoration: none;
      font-size: 11.5px;
      font-weight: 600;
      transition: color 0.15s;
    }

    .h-aux-links a:hover { color: var(--rp-mint); text-decoration: underline; }

    /* ======= TOAST ======= */
    .login-toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--primary);
      color: #fff;
      padding: 11px 22px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      z-index: 999;
      pointer-events: none;
      transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.35s;
      opacity: 0;
      white-space: nowrap;
    }

    .login-toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* ── Hidden footer (JS compat) ─────── */
    .security-footer { display: none; }

    /* ======= RESPONSIVE ======= */
    @media (max-width: 1024px) {
      .cover-panel { flex: 0 0 52%; }
      .right-panel { padding: 36px 32px; }
    }

    @media (max-width: 720px) {
      body {
        flex-direction: column;
        height: auto;
        min-height: 100vh;
        overflow-y: auto;
        overflow-x: hidden;
      }

      .cover-panel {
        flex: none;
        width: 100%;
        height: 40vh;
        min-height: 220px;
        border-left: none;
        border-bottom: 1px solid rgba(90, 143, 123, 0.22);
      }

      .right-panel {
        flex: none;
        width: 100%;
        overflow-y: visible;
        padding: 28px 22px 40px;
        border-left: none;
        animation: none;
      }

      .rp-fields-row { grid-template-columns: 1fr; }
      .rp-heading    { font-size: 36px; }
    }

    /* ── Reduced-motion ─────── */
    @media (prefers-reduced-motion: reduce) {
      .cover-img, .float-orb, .right-panel,
      .rp-logo, .rp-heading, .animated-sub,
      .hero-quote-box, .rp-divider, .rp-form { animation: none; }
      .fade-cycle        { animation: none; }
      .hero-quote-text   { animation: none !important; }
    }
  </style>
</head>
<body>

  <!-- ── LEFT: COVER IMAGE PANEL ─────── -->
  <div class="cover-panel" aria-hidden="true">
    <img class="cover-img" src="/assets/login-cover.svg" alt="WorkDesk login illustration" />
    <div class="cover-anim-layer">
      <div class="float-orb"></div>
      <div class="float-orb"></div>
      <div class="float-orb"></div>
      <div class="float-orb"></div>
      <div class="float-orb"></div>
      <div class="float-orb"></div>
      <div class="float-orb"></div>
    </div>
  </div>

  <!-- ── RIGHT: CONTENT + LOGIN PANEL ─────── -->
  <div class="right-panel">
    <div class="rp-inner">

      <!-- Logo -->
      <div class="rp-logo">
        <img class="rp-logo-img" src="/assets/workdesk-logo.svg" alt="myWORKDESK" />
      </div>

      <!-- Hero heading -->
      <h1 class="rp-heading">Elevate Your<br>Workforce.</h1>

      <!-- Animated subtitle -->
      <div class="animated-sub">
        Driven by
        <span id="textRotator" class="rotator-text fade-cycle">Performance Analytics</span>
      </div>

      <!-- Rotating motivational quote -->
      <div class="hero-quote-box">
        <p class="hero-quote-text" id="heroQuoteText"></p>
        <span class="hero-quote-author" id="heroQuoteAuthor"></span>
      </div>

      <!-- Divider -->
      <div class="rp-divider"></div>

      <!-- ── LOGIN FORM ─────── -->
      <form class="rp-form" id="loginForm" novalidate>

        <!-- Org ID + Employee ID side-by-side -->
        <div class="rp-fields-row">

          <div class="h-field">
            <div class="h-input-wrap">
              <i class="fa-solid fa-building h-icon"></i>
              <input
                type="text"
                id="orgId"
                name="orgId"
                placeholder="Organization ID"
                autocomplete="off"
                required
              />
            </div>
            <span class="h-field-error" id="orgIdError">Required</span>
          </div>

          <div class="h-field">
            <div class="h-input-wrap">
              <i class="fa-solid fa-user h-icon"></i>
              <input
                type="text"
                id="employeeId"
                name="employeeId"
                placeholder="Employee ID"
                autocomplete="username"
                required
              />
            </div>
            <span class="h-field-error" id="employeeIdError">Required</span>
          </div>

        </div>

        <!-- Password -->
        <div class="h-field">
          <div class="h-input-wrap">
            <i class="fa-solid fa-lock h-icon"></i>
            <input
              type="password"
              id="password"
              name="password"
              class="pwd-input"
              placeholder="Password"
              autocomplete="current-password"
              required
            />
            <button type="button" class="h-eye-toggle" id="eyeToggle" aria-label="Toggle password visibility">
              <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
          <span class="h-field-error" id="passwordError">Required</span>
        </div>

        <!-- Sign In -->
        <button type="submit" class="btn-header-signin" id="loginBtn">
          <span class="btn-label">Sign In</span>
          <span class="h-spinner" aria-hidden="true"></span>
        </button>

        <!-- OR divider -->
        <div class="rp-sso-row">
          <div class="rp-sso-divider"></div>
          <span class="h-sep">OR</span>
          <div class="rp-sso-divider"></div>
        </div>

        <!-- SSO buttons -->
        <div class="h-sso-btns">
          <button class="h-sso-btn" type="button" id="googleBtn" aria-label="Sign in with Google">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Google
          </button>
          <button class="h-sso-btn" type="button" id="msBtn" aria-label="Sign in with Microsoft">
            <svg width="13" height="13" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M11.4 2H2v9.4h9.4V2z" fill="#F25022"/>
              <path d="M22 2h-9.4v9.4H22V2z" fill="#7FBA00"/>
              <path d="M11.4 12.6H2V22h9.4v-9.4z" fill="#00A4EF"/>
              <path d="M22 12.6h-9.4V22H22v-9.4z" fill="#FFB900"/>
            </svg>
            Microsoft
          </button>
        </div>

        <!-- Aux links -->
        <div class="h-aux-links">
          <a href="#forgot" id="forgotLink">Forgot Password?</a>
          <a href="#signup" id="orgSignupLink">Sign Up</a>
        </div>

      </form>
    </div>
  </div>

  <!-- Hidden footer kept for JS compatibility -->
  <footer class="security-footer">
    <span id="copyrightYear"></span>
  </footer>

  <!-- Toast notification -->
  <div class="login-toast" id="loginToast" role="status" aria-live="polite"></div>

  <script>
    // ── Dynamic copyright year ────────────────────────────────────────────────
    document.getElementById('copyrightYear').textContent = new Date().getFullYear();

    // ── Role text rotator ─────────────────────────────────────────────────────
    var roles = ['Performance Analytics', 'Global Recruitment', 'Real-time Attendance', 'Integrated Payroll', 'Strategic Reporting'];
    var roleIndex = 0;
    var rotatorEl = document.getElementById('textRotator');

    setInterval(function () {
      roleIndex = (roleIndex + 1) % roles.length;
      rotatorEl.classList.remove('fade-cycle');
      void rotatorEl.offsetWidth; // force reflow so CSS animation restarts
      rotatorEl.textContent = roles[roleIndex];
      rotatorEl.classList.add('fade-cycle');
    }, 4000);

    // ── Motivational quotes (rotate every 20 min, synced to clock) ────────────
    var QUOTES = [
      { text: 'The only way to do great work is to love what you do.',                               author: 'Steve Jobs'          },
      { text: 'Success is not the key to happiness. Happiness is the key to success.',               author: 'Albert Schweitzer'   },
      { text: 'Believe you can and you\u2019re halfway there.',                                       author: 'Theodore Roosevelt'  },
      { text: 'Hard work beats talent when talent doesn\u2019t work hard.',                          author: 'Tim Notke'           },
      { text: 'The future depends on what you do today.',                                             author: 'Mahatma Gandhi'      },
      { text: 'Don\u2019t watch the clock; do what it does. Keep going.',                            author: 'Sam Levenson'        },
      { text: 'Coming together is a beginning, staying together is progress, and working together is success.', author: 'Henry Ford' },
      { text: 'Excellence is not a destination but a continuous journey that never ends.',            author: 'Brian Tracy'         },
      { text: 'Teamwork makes the dream work.',                                                       author: 'John C. Maxwell'     },
      { text: 'Your attitude, not your aptitude, will determine your altitude.',                     author: 'Zig Ziglar'          }
    ];

    var QUOTE_INTERVAL_MS = 20 * 60 * 1000;
    var quoteIndex = Math.floor(Date.now() / QUOTE_INTERVAL_MS) % QUOTES.length;

    function renderHeroQuote(idx, animated) {
      var textEl   = document.getElementById('heroQuoteText');
      var authorEl = document.getElementById('heroQuoteAuthor');
      if (!textEl) return;
      var q = QUOTES[idx];
      if (!animated) {
        textEl.textContent   = '\u201C' + q.text + '\u201D';
        authorEl.textContent = '\u2014 ' + q.author;
        return;
      }
      textEl.classList.remove('fade-in');
      textEl.classList.add('fade-out');
      setTimeout(function () {
        textEl.textContent   = '\u201C' + q.text + '\u201D';
        authorEl.textContent = '\u2014 ' + q.author;
        textEl.classList.remove('fade-out');
        textEl.classList.add('fade-in');
        setTimeout(function () { textEl.classList.remove('fade-in'); }, 600);
      }, 400);
    }

    renderHeroQuote(quoteIndex, false);

    var msUntilNextSlot = QUOTE_INTERVAL_MS - (Date.now() % QUOTE_INTERVAL_MS);
    setTimeout(function () {
      quoteIndex = (quoteIndex + 1) % QUOTES.length;
      renderHeroQuote(quoteIndex, true);
      setInterval(function () {
        quoteIndex = (quoteIndex + 1) % QUOTES.length;
        renderHeroQuote(quoteIndex, true);
      }, QUOTE_INTERVAL_MS);
    }, msUntilNextSlot);

    // ── Toast helper ─────────────────────────────────────────────────────────
    function showToast(msg, duration) {
      var toast = document.getElementById('loginToast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(function () { toast.classList.remove('show'); }, duration || 3000);
    }

    // ── Field error helpers ───────────────────────────────────────────────────
    function setFieldError(inputId, errorId, message) {
      var input = document.getElementById(inputId);
      var err   = document.getElementById(errorId);
      if (!input || !err) return;
      if (message) {
        input.classList.add('is-invalid');
        err.textContent   = message;
        err.style.display = 'block';
      } else {
        input.classList.remove('is-invalid');
        err.style.display = 'none';
      }
    }

    function clearFieldErrors() {
      setFieldError('orgId',      'orgIdError',      null);
      setFieldError('employeeId', 'employeeIdError', null);
      setFieldError('password',   'passwordError',   null);
    }

    document.getElementById('orgId').addEventListener('input', function () {
      setFieldError('orgId', 'orgIdError', null);
    });
    document.getElementById('employeeId').addEventListener('input', function () {
      setFieldError('employeeId', 'employeeIdError', null);
    });
    document.getElementById('password').addEventListener('input', function () {
      setFieldError('password', 'passwordError', null);
    });

    // ── Password visibility toggle ────────────────────────────────────────────
    document.getElementById('eyeToggle').addEventListener('click', function () {
      var pwd  = document.getElementById('password');
      var icon = document.getElementById('eyeIcon');
      if (pwd.type === 'password') {
        pwd.type = 'text';
        icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>';
      } else {
        pwd.type = 'password';
        icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>';
      }
    });

    // ── Forgot password ───────────────────────────────────────────────────────
    document.getElementById('forgotLink').addEventListener('click', function (e) {
      e.preventDefault();
      var empId = document.getElementById('employeeId').value.trim();
      if (!empId) {
        setFieldError('employeeId', 'employeeIdError', 'Enter Employee ID first.');
        return;
      }
      showToast('Password reset request submitted for Employee ID: ' + empId + '. Contact your HR Team.');
    });

    // ── Social SSO buttons ────────────────────────────────────────────────────
    document.getElementById('googleBtn').addEventListener('click', function () {
      showToast('Google SSO is configured via your Cloudflare Access policy.');
    });
    document.getElementById('msBtn').addEventListener('click', function () {
      showToast('Microsoft SSO is configured via your Cloudflare Access policy.');
    });

    // ── Organization sign-up link ─────────────────────────────────────────────
    document.getElementById('orgSignupLink').addEventListener('click', function (e) {
      e.preventDefault();
      showToast('Organization registration is coming soon. Contact the WorkDesk team to get started.');
    });

    // ── Login form submit ─────────────────────────────────────────────────────
    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();
      clearFieldErrors();

      var btn        = document.getElementById('loginBtn');
      var orgId      = document.getElementById('orgId').value.trim();
      var employeeId = document.getElementById('employeeId').value.trim();
      var password   = document.getElementById('password').value;
      var valid      = true;

      if (!orgId)      { setFieldError('orgId',      'orgIdError',      'Required'); valid = false; }
      if (!employeeId) { setFieldError('employeeId', 'employeeIdError', 'Required'); valid = false; }
      if (!password)   { setFieldError('password',   'passwordError',   'Required'); valid = false; }
      if (!valid) return;

      // Persist display name derived from employee ID
      var nameParts   = employeeId.split(/[._-]/).filter(function (w) { return w.length > 0; });
      var displayName = nameParts.length > 0
        ? nameParts.map(function (w) { return w.charAt(0).toUpperCase() + w.slice(1).toLowerCase(); }).join(' ')
        : 'Employee ' + employeeId;
      localStorage.setItem('workdesk_display_name', displayName);

      var btnLabel = btn.querySelector('.btn-label');
      if (btnLabel) btnLabel.textContent = 'Signing in\u2026';
      btn.classList.add('loading');
      btn.disabled = true;

      fetch('/api/auth', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ orgId: orgId, employeeId: employeeId, password: password })
      })
      .then(function (res) { return res.json(); })
      .then(function (data) {
        if (data && data.ok) {
          if (data.token) localStorage.setItem('workdesk_token', data.token);
          window.location.href = 'dashboard.html';
        } else {
          showToast(data && data.message ? data.message : 'Invalid credentials. Please try again.');
          if (btnLabel) btnLabel.textContent = 'Sign In';
          btn.classList.remove('loading');
          btn.disabled = false;
        }
      })
      .catch(function () {
        showToast('Login failed. Please check your connection and try again.');
        if (btnLabel) btnLabel.textContent = 'Sign In';
        btn.classList.remove('loading');
        btn.disabled = false;
      });
    });
  </script>

</body>
</html>
